<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>AI Assistant Pro</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    :root {
      --primary: #4e73df;
      --primary-dark: #2e59d9;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #2b3a67;
      --muted: #8892a6;
      --border: #e6e9f2;
      --success-bg: #e8f5e9;
      --success-fg: #2e7d32;
      --error-bg:   #ffebee;
      --error-fg:   #c62828;
      --shadow: 0 2px 12px rgba(46, 89, 217, 0.06);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      font-size: 13px;
    }

    /* ---------- HEADER ---------- */
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .header .logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #6f86ff);
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px;
    }
    .header h1 { font-size: 16px; margin: 0; }
    .header p  { font-size: 11px; margin: 2px 0 0; color: var(--muted); }

    /* ---------- CARD ---------- */
    .card {
      background: var(--card); border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 14px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      color: var(--muted); margin: 0 0 8px;
      display: flex; justify-content: space-between; align-items: center;
    }

    label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }
    input, textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 10px; font-size: 13px; outline: none; transition: border .15s, box-shadow .15s;
      font-family: inherit; resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(78, 115, 223, .15);
    }

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    button {
      background: var(--primary); color: white; border: 0;
      padding: 11px 14px; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .05s;
    }
    button:hover:not(:disabled) { background: var(--primary-dark); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button.secondary {
      background: transparent; color: var(--primary);
      border: 1px solid var(--primary);
    }
    button.secondary:hover { background: rgba(78,115,223,.07); }

    .full { width: 100%; margin-top: 10px; }

    /* ---------- HISTORY ---------- */
    .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
    .history-item {
      display: flex; gap: 6px; align-items: flex-start;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      font-size: 11px; line-height: 1.4;
      background: #f7f8fc;
      transition: background .15s;
    }
    .history-item:hover { background: #eaefff; }
    .hi-icon { flex-shrink: 0; }
    .hi-text {
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .muted { color: var(--muted); font-size: 11px; font-style: italic; }
    .link  { color: var(--primary); cursor: pointer; font-size: 11px; }

    /* ---------- RESULT ---------- */
    #result {
      margin-top: 8px; padding: 10px 12px; border-radius: 8px;
      font-size: 12px; line-height: 1.5; min-height: 20px;
      white-space: pre-wrap;
    }
    .status-loading { color: var(--primary); font-weight: 500; animation: pulse 1.4s infinite; }
    .status-success { background: var(--success-bg); color: var(--success-fg); border: 1px solid #c8e6c9; }
    .status-error   { background: var(--error-bg);   color: var(--error-fg);   border: 1px solid #ffcdd2; }
    @keyframes pulse { 0%,100%{opacity:.6;} 50%{opacity:1;} }

    .footer { text-align: center; color: var(--muted); font-size: 10px; margin-top: 14px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">AI</div>
    <div>
      <h1>AI Assistant Pro</h1>
      <p>ИП Посаднев · Аналитика нового поколения · v2.0</p>
    </div>
  </div>

  <!-- ЛИЦЕНЗИЯ -->
  <div class="card">
    <div class="card-title">🔑 Лицензия</div>
    <div class="row">
      <input type="text" id="licenseKey" placeholder="Введите ключ (например, BOSS-0000)">
      <button class="secondary" id="verifyBtn" style="flex:0 0 auto;">Проверить</button>
    </div>
  </div>

  <!-- ОСНОВНОЙ ВВОД -->
  <div class="card">
    <div class="card-title">📝 Задача для ИИ</div>
    <textarea id="promptInput" rows="5"
      placeholder="Опишите, что нужно сделать. Например:&#10;• Сделай наценку 15% на товары бренда Elanco и выведи итог&#10;• Подсвети красным просроченные даты в столбце 'Срок'&#10;• Построй сводку продаж по месяцам с диаграммой&#10;&#10;Подсказка: Ctrl+Enter — запустить."></textarea>
    <button id="runBtn" class="full">🚀 ЗАПУСТИТЬ ИИ</button>
    <div id="result"></div>
  </div>

  <!-- ИСТОРИЯ -->
  <div class="card">
    <div class="card-title">
      🕘 История
      <span class="link" id="clearHistoryBtn">очистить</span>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="footer">
    © ИП Посаднев · поддержка: posadnev.ru/support
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
